name: External Security Audit

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Run cargo audit
        run: cargo audit --color never

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            zricethezav/gitleaks:v8.30.1 \
            detect \
            --source=/repo \
            --redact \
            --no-banner \
            --exit-code=1
